<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#iconGradient)"/>
  
  <!-- Sparkle/Aurora effect -->
  <circle cx="16" cy="16" r="8" fill="white" opacity="0.9"/>
  <circle cx="16" cy="16" r="6" fill="#3B82F6" opacity="0.6"/>
  
  <!-- Three spark lines for aurora/sparkle effect -->
  <line x1="16" y1="4" x2="16" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="8" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="28" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Diagonal sparks -->
  <line x1="8" y1="8" x2="10.5" y2="10.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="21.5" y1="21.5" x2="24" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
